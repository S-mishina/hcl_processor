# E2E test config: files pattern (specifying individual files)
bedrock:
  aws_region: "ap-northeast-1"
  system_prompt: |
    You are a Terraform code analyzer specializing in Datadog monitor configurations.

    Your task is to analyze the provided Terraform code and generate a JSON document that describes ALL monitor configurations.

    Important rules:
    1. Identify ALL monitors in the Terraform code
    2. For EACH monitor:
       - Extract the monitor name
       - Use the exact query from the configuration
       - Extract the message content
       - For thresholds, use "critical: X, warning: Y" format
       - Include tags
       - Set evaluation period based on the timeframe
    3. Generate a JSON array where each object represents a monitor

  output_json: |
    {
      "$schema": "http://json-schema.org/draft-07/schema#",
      "type": "array",
      "title": "Datadog Alert Design Schema",
      "items": {
        "type": "object",
        "properties": {
          "monitor_name": {"type": "string", "description": "Monitor name"},
          "type": {"type": "string", "description": "Monitor type"},
          "query": {"type": "string", "description": "Datadog monitor query"},
          "evaluation_period": {"type": "string", "description": "Evaluation period"},
          "notification": {"type": "string", "description": "Notification destination"},
          "tags": {"type": "string", "description": "Tags"},
          "alert_message": {"type": "string", "description": "Alert message"},
          "note": {"type": "string", "description": "Notes"},
          "dev_threshold": {"type": "string", "description": "Dev threshold"},
          "stg_threshold": {"type": "string", "description": "Stg threshold"},
          "prd_threshold": {"type": "string", "description": "Prd threshold"}
        },
        "required": ["monitor_name", "type", "query", "evaluation_period", "notification", "tags", "alert_message", "note", "dev_threshold", "stg_threshold", "prd_threshold"]
      }
    }

  payload:
    anthropic_version: "bedrock-2023-05-31"
    max_tokens: 4096
    temperature: 0
    top_p: 1
    top_k: 0

  read_timeout: 120
  connect_timeout: 30

  retries:
    max_attempts: 5
    mode: standard

schema_columns:
  - monitor_name
  - type
  - query
  - evaluation_period
  - notification
  - tags
  - alert_message
  - note
  - dev_threshold
  - stg_threshold
  - prd_threshold

output:
  json_path: e2e_tests/output/output_files.json
  markdown_path: e2e_tests/output/output_files.md
  markdown_template: |
    ##### {{ title }}

    | {% for col in columns %}{{ col }} | {% endfor %}
    |{% for col in columns %}:---|{% endfor %}
    {% for row in data %}| {% for col in columns %}{{ row[col] }} | {% endfor %}
    {% endfor %}

input:
  resource_data:
    # Using files pattern instead of folder
    files:
      - e2e_tests/test_data/monitor/sample_monitor.tf
      - e2e_tests/test_data/resource/simple_resource.tf

  local_files:
    - dev: e2e_tests/test_data/dev/locals.tf
    - stg: e2e_tests/test_data/stg/locals.tf
    - prd: e2e_tests/test_data/prd/locals.tf

  modules:
    path: e2e_tests/test_data/modules/monitor/main.tf
    enabled: false  # Disabled for resource pattern test

  failback:
    enabled: false
    type: resource
    options:
      target: monitors
